<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — YAP-IT</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function(){
      var t = localStorage.getItem('theme') ||
              (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    .error-page__code {
      font-family: var(--font-display);
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 700;
      line-height: 1;
      background: var(--gradient-hero-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-page h1 { font-size: var(--size-2xl); margin-bottom: 0.5rem; }
    .error-page p  { color: var(--color-text-muted); max-width: 40ch; }
    .error-page__actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-page__code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or was moved. Let's get you back on track.</p>
    <div class="error-page__actions">
      <a href="index.html" class="btn btn--primary">Go Home</a>
      <a href="index.html#contact" class="btn btn--outline">Contact Me</a>
    </div>
  </main>
</body>
</html>
